# =============================================================================
# PostgreSQL 16 — PRIMARY Configuration
# Optimized for replication benchmark (1 primary + 3 async replicas)
# =============================================================================

# --- Connection Settings ---
listen_addresses = '*'
port = 5432
max_connections = 200

# --- Memory ---
shared_buffers = 128MB
effective_cache_size = 256MB
work_mem = 4MB
maintenance_work_mem = 64MB

# --- WAL (Write-Ahead Logging) ---
wal_level = replica
max_wal_senders = 10
max_replication_slots = 10
wal_keep_size = 256MB
synchronous_commit = on

# --- Replication ---
# Async replication (no synchronous_standby_names = async mode)
hot_standby = on
hot_standby_feedback = on

# --- Logging ---
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_statement = 'none'
log_min_duration_statement = 1000

# --- Stats ---
track_activities = on
track_counts = on
track_io_timing = on

# --- Checkpoints ---
checkpoint_timeout = 5min
checkpoint_completion_target = 0.9
