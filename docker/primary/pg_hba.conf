# =============================================================================
# PostgreSQL 16 — pg_hba.conf (Host-Based Authentication)
# Allow replication from any host in the Docker network
# =============================================================================

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local connections
local   all             all                                     trust

# IPv4 local connections
host    all             all             127.0.0.1/32            trust

# IPv6 local connections
host    all             all             ::1/128                 trust

# Allow all Docker network connections (for benchmark clients)
host    all             all             0.0.0.0/0               md5

# Replication connections from any host (Docker network)
host    replication     all             0.0.0.0/0               md5
